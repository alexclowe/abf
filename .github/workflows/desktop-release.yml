name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'desktop-v*'

# Cancel in-progress runs for the same ref
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write    # Required for creating releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Toolchain setup ──────────────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      # ── Platform dependencies ────────────────────────────────────────────

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Build Node packages ──────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # ── Generate icons if missing ────────────────────────────────────────

      - name: Generate placeholder icons
        run: node packages/desktop/scripts/generate-icons.mjs

      # ── Build Tauri app ──────────────────────────────────────────────────

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tagName: desktop-v__VERSION__
          releaseName: 'ABF Desktop v__VERSION__'
          releaseBody: |
            ## ABF Desktop

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Windows | `.msi` or `.exe` |
            | Linux (Debian/Ubuntu) | `.deb` |
            | Linux (AppImage) | `.AppImage` |
          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
